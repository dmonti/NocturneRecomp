# sdk_version is intentionally empty: the SDK is downloaded as a prebuilt nightly
# (pinned in .sdk-version). An empty value lets codegen accept any installed SDK.
# codegen re-stamps this to the SDK floor in the working tree after each run;
# do not commit that change.
[project]
sdk_version = ""
name = "nocturnerecomp"

[entrypoint]
file_path = "assets/default.xex"
out_directory_path = "generated"
includes = [
  "nocturnerecomp_config.toml",
]
