# sdk_version is intentionally empty: this project ships its own SDK as a submodule,
# so codegen's migration step always regenerates generated/rexglue.cmake against the
# SDK that is built (a fresh CI checkout has no generated/ dir). codegen re-stamps this
# to the SDK floor in the working tree after each run; do not commit that change.
[project]
sdk_version = ""
name = "nocturnerecomp"

[entrypoint]
file_path = "assets/default.xex"
out_directory_path = "generated"
includes = [
  "nocturnerecomp_config.toml",
]
