name: Build nocturnerecomp

on:
  workflow_call:
    inputs:
      publish_mode:
        description: "'artifact' for CI workflow-artifact, 'release' for GitHub release"
        required: true
        type: string
      artifact_name:
        description: "Artifact name prefix when publish_mode is 'artifact'"
        required: false
        type: string
        default: ""
      tag:
        description: "Release tag to embed in release artifact filenames"
        required: false
        type: string
        default: ""

env:
  ASSETS_REPO: ${{ vars.ASSETS_REPO }}
  ASSET_PATH: default.xex
  ASSET_CACHE_KEY: codegen-assets-v1

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            sdk_dir: win-amd64
            artifact_suffix: windows-x64

          - platform: linux
            runner: ubuntu-latest
            sdk_dir: linux-amd64
            artifact_suffix: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y ninja-build libgtk-3-dev libx11-xcb-dev libxss-dev
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 200

      - name: Install LLVM, CMake, Ninja (Windows)
        if: matrix.platform == 'windows'
        run: choco install llvm cmake ninja -y

      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          variant: sccache
          key: ${{ matrix.platform }}-amd64

      - name: Build ReXGlue SDK from submodule
        shell: bash
        env:
          CC: ${{ matrix.platform == 'linux' && 'clang-20' || '' }}
          CXX: ${{ matrix.platform == 'linux' && 'clang++-20' || '' }}
        run: |
          cd rexglue-sdk
          cmake --preset ${{ matrix.sdk_dir }}
          cmake --build --preset ${{ matrix.sdk_dir }}-release -- -j$(nproc 2>/dev/null || echo $NUMBER_OF_PROCESSORS)
          cmake --install out/build/${{ matrix.sdk_dir }} --config Release --prefix "$GITHUB_WORKSPACE/sdk"

      - name: Cache XEX asset for codegen
        id: asset-cache
        uses: actions/cache@v5
        with:
          path: assets/${{ env.ASSET_PATH }}
          key: ${{ env.ASSET_CACHE_KEY }}

      - name: Fetch XEX asset
        if: steps.asset-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.ASSETS_TOKEN }}
        shell: bash
        run: |
          mkdir -p assets
          gh api -H "Accept: application/vnd.github.raw" \
            "repos/${{ env.ASSETS_REPO }}/contents/${{ env.ASSET_PATH }}" \
            > "assets/${{ env.ASSET_PATH }}"
          size=$(wc -c < "assets/${{ env.ASSET_PATH }}")
          echo "Fetched ${{ env.ASSET_PATH }} ($size bytes)"
          [ "$size" -ge 1048576 ] || { echo "Asset too small — fetch likely failed"; exit 1; }

      - name: Build
        shell: bash
        run: python scripts/build.py --sdk-dir sdk

      - name: sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true

      - name: Package
        shell: bash
        run: |
          if [ "${{ inputs.publish_mode }}" = "artifact" ]; then
            out="${{ inputs.artifact_name }}-${{ matrix.artifact_suffix }}"
          else
            out="nocturnerecomp-${{ inputs.tag }}-${{ matrix.artifact_suffix }}"
          fi
          python scripts/build.py --package "${out}"

      - name: Upload CI artifact
        if: inputs.publish_mode == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: pkg/
          if-no-files-found: error

      - name: Upload release artifact
        if: inputs.publish_mode == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
