name: Build nocturnerecomp

on:
  workflow_call:
    inputs:
      publish_mode:
        description: "'artifact' for CI workflow-artifact, 'release' for GitHub release"
        required: true
        type: string
      artifact_name:
        description: "Artifact name prefix when publish_mode is 'artifact'"
        required: false
        type: string
        default: ""
      tag:
        description: "Release tag to embed in release artifact filenames"
        required: false
        type: string
        default: ""

env:
  ASSETS_REPO: ${{ vars.ASSETS_REPO }}
  ASSET_PATH: default.xex
  ASSET_CACHE_KEY: codegen-assets-v1
  TU_ASSET_CACHE_KEY: tu-assets-v1

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-x64
          - linux-x64
          - linux-arm64
        include:
          - platform: windows-x64
            runner: windows-latest
            sdk_dir: win-amd64
            artifact_suffix: windows-x64

          - platform: linux-x64
            runner: ubuntu-latest
            sdk_dir: linux-amd64
            artifact_suffix: linux-x64

          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            sdk_dir: linux-arm64
            artifact_suffix: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux-x64' || matrix.platform == 'linux-arm64'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y \
            ninja-build libgtk-3-dev libx11-xcb-dev libxss-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev \
            libdbus-1-dev libudev-dev libusb-1.0-0-dev
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 200

      - name: Install LLVM, CMake, Ninja (Windows)
        if: matrix.platform == 'windows-x64'
        run: choco install llvm cmake ninja -y

      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          variant: sccache
          key: ${{ matrix.platform }}-amd64

      - name: Cache XEX asset for codegen
        id: asset-cache
        uses: actions/cache@v5
        with:
          path: assets/${{ env.ASSET_PATH }}
          key: ${{ env.ASSET_CACHE_KEY }}

      - name: Fetch XEX asset
        if: steps.asset-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.ASSETS_TOKEN }}
        shell: bash
        run: |
          mkdir -p assets
          gh api -H "Accept: application/vnd.github.raw" \
            "repos/${{ env.ASSETS_REPO }}/contents/${{ env.ASSET_PATH }}" \
            > "assets/${{ env.ASSET_PATH }}"
          size=$(wc -c < "assets/${{ env.ASSET_PATH }}")
          echo "Fetched ${{ env.ASSET_PATH }} ($size bytes)"
          [ "$size" -ge 1048576 ] || { echo "Asset too small — fetch likely failed"; exit 1; }

      - name: Cache TU packages
        id: tu-cache
        uses: actions/cache@v5
        with:
          path: tu_packages/
          key: ${{ env.TU_ASSET_CACHE_KEY }}

      - name: Fetch TU packages
        if: steps.tu-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.ASSETS_TOKEN }}
        shell: bash
        run: |
          mkdir -p tu_packages
          files=$(gh api "repos/${{ env.ASSETS_REPO }}/contents" \
            --jq '.[] | select(.name | startswith("TU_")) | .name')
          for f in $files; do
            gh api -H "Accept: application/vnd.github.raw" \
              "repos/${{ env.ASSETS_REPO }}/contents/${f}" \
              > "tu_packages/${f}"
            echo "Fetched ${f} ($(wc -c < "tu_packages/${f}") bytes)"
          done

      # Download the SDK once per platform/arch and reuse it for both the
      # vanilla and TU builds below, instead of each variant fetching its
      # own copy — the SDK release API is rate-limited and doubling the
      # number of downloads was tripping it.
      - name: Download SDK
        shell: bash
        run: python scripts/download-sdk.py "sdk/${{ matrix.sdk_dir }}" --pinned

      - name: Build (vanilla)
        shell: bash
        run: python scripts/build.py --sdk-dir sdk/${{ matrix.sdk_dir }}

      - name: Package (vanilla)
        shell: bash
        run: |
          if [ "${{ inputs.publish_mode }}" = "artifact" ]; then
            out="${{ inputs.artifact_name }}-${{ matrix.artifact_suffix }}"
          else
            out="nocturnerecomp-${{ inputs.tag }}-${{ matrix.artifact_suffix }}"
          fi
          python scripts/build.py --package "${out}"

      - name: Upload CI artifact (vanilla)
        if: inputs.publish_mode == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-${{ matrix.artifact_suffix }}
          path: pkg/
          if-no-files-found: error

      - name: Upload release artifact (vanilla)
        if: inputs.publish_mode == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-vanilla-${{ matrix.platform }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - name: Build (tu)
        shell: bash
        run: python scripts/build.py --sdk-dir sdk/${{ matrix.sdk_dir }} --tu tu_packages/

      - name: Package (tu)
        shell: bash
        run: |
          if [ "${{ inputs.publish_mode }}" = "artifact" ]; then
            out="${{ inputs.artifact_name }}-tu-${{ matrix.artifact_suffix }}"
          else
            out="nocturnerecomp-tu-${{ inputs.tag }}-${{ matrix.artifact_suffix }}"
          fi
          python scripts/build.py --package "${out}"

      - name: Upload CI artifact (tu)
        if: inputs.publish_mode == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-tu-${{ matrix.artifact_suffix }}
          path: pkg/
          if-no-files-found: error

      - name: Upload release artifact (tu)
        if: inputs.publish_mode == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-tu-${{ matrix.platform }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - name: sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true
