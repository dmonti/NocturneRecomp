# nocturnerecomp - ReXGlue codegen config
#
# Add named functions (indirect-call targets), midasm hooks, and CRT
# addresses here once they are located in assets/default.xex.
#
# Example:
#   [functions]
#   0x8XXXXXXX = {name = "MyFunction"}
#
#   [[midasm_hook]]
#   address = 0x8XXXXXXX
#   name = "MyHook"
#   registers = ["r3"]
#   return = true
#
#   [rexcrt]
#   memcpy  = 0x8XXXXXXX
#   memset  = 0x8XXXXXXX
#   memmove = 0x8XXXXXXX

[functions]
0x8282AEF0 = {}
0x82286638 = {}

[rexcrt]
memcpy  = 0x825E3300
memmove = 0x825E37D0
memset  = 0x825E2740
